version: '3.9'

services:
  # MySQL database
  db:
    image: mysql:8.0
    container_name: db4fresh_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: example_root_pwd
      MYSQL_DATABASE: db4fresh
      MYSQL_USER: db_user
      MYSQL_PASSWORD: example_user_pwd
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Zookeeper (required by Kafka)
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: db4fresh_zookeeper
    restart: unless-stopped
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  # Kafka broker
  kafka:
    image: bitnami/kafka:latest
    container_name: db4fresh_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  # Backend (Express API)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: db4fresh_backend
    restart: unless-stopped
    depends_on:
      - db
      - kafka
    environment:
      - PORT=4000
      - DB_HOST=db
      - DB_USER=db_user
      - DB_PASSWORD=example_user_pwd
      - DB_NAME=db4fresh
      - KAFKA_BROKER=kafka:9092
      # Add other env vars as required (e.g., JWT_SECRET)
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads

  # Frontend (Vite + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: db4fresh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:4000

volumes:
  db_data:
