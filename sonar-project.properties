sonar.projectKey=db4fresh
sonar.projectName=Db4fresh
sonar.projectVersion=1.0

# Sources
sonar.sources=src,backend

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/.git/**,**/coverage/**,**/*.test.*,**/*.spec.*

# Test reporting
sonar.javascript.lcov.reportPaths=coverage/lcov.info,backend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
